# Configuration for cargo-audit
# See https://github.com/rustsec/rustsec/tree/main/cargo-audit

[advisories]
# Ignore advisories for specific issues
ignore = [
    # RUSTSEC-2024-0436: paste crate is marked as unmaintained but is feature-complete
    # This is a transitive dependency from metal -> wgpu-hal and there's no alternative
    # The crate is widely used and considered stable despite being archived
    "RUSTSEC-2024-0436",
    
    # RUSTSEC-2024-0384: instant crate is marked as unmaintained
    # This is a transitive dependency and the recommended replacement web-time
    # is not compatible with non-WASM targets. The instant crate is still widely
    # used and considered stable despite being unmaintained.
    "RUSTSEC-2024-0384",

    # RUSTSEC-2026-0194 / RUSTSEC-2026-0195: quick-xml vulnerabilities in
    # wayland-scanner are limited to build-time proc-macro code generation over
    # trusted protocol XML shipped by upstream crates, not untrusted runtime input.
    "RUSTSEC-2026-0194",
    "RUSTSEC-2026-0195",

    # RUSTSEC-2026-0204: crossbeam-epoch is only pulled in through criterion for
    # local benchmarks and is not part of shipped application/runtime code.
    "RUSTSEC-2026-0204",
]
